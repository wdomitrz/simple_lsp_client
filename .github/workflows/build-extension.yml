name: Build and Package Extension

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # Grants the workflow permission to create and write to GitHub Releases
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: make

      - name: Build VSIX Package
        run: make vsix

      # Reads the version field from your package.json to name the release
      - name: Get Extension Version
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "ext_version=$VERSION" >> $GITHUB_OUTPUT

      # Uploads the raw .vsix directly to a Release
      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.ext_version }}
          name: Release v${{ steps.get_version.outputs.ext_version }}
          files: "*.vsix"
          draft: false
          prerelease: false
          fail_on_unmatched_tag: true
